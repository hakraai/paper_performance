[workspace]
name = "paper_performance"
version = "0.1.0"
description = "Performance testing, comparison and selection of induced seismicity rate models for the Groningen gas field"
authors = ["D.A. Kraaijpoel"]
channels = ["conda-forge"]
platforms = ["linux-64"]

[activation]
env = { PYTHONPATH = "$PIXI_PROJECT_ROOT/src/chaintools:$PIXI_PROJECT_ROOT/src" }

[tasks]
start = "jupyter lab"

[dependencies]
python = "==3.11.9"
numpy = "*"
geopandas = "==1.0.1"
xarray = "==2025.10.1"
tqdm = "==4.66.1"
scipy = "==1.16.0"
matplotlib = "==3.10.0"
arviz = "==0.22.0"
pandas = "==2.2.3"
ipywidgets = "==8.1.7"
pytensor = "==2.31.7"
pymc = "==5.25.1"
zarr = "==2.18.7"
jupyterlab = "*"
requests = "==2.31.0"
pyyaml = "==6.0"
rioxarray = "==0.19.0"
h5py = "==3.11.0"
numba = "==0.61.2"
h5netcdf = "==1.4.1"
blackjax = "==1.2.4"
jax = "==0.5.2"
jaxlib = "==0.5.2"
nutpie = "==0.14.3"
